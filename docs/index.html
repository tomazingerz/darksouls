<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dark Souls No-Hit | tomazingerz</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Herramientas, Rutas, Trucos y Consejos para mejorar tu experiencia en la No-Hit de Dark Souls">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">

  <style>
    :root {
      --bg-primary: #0a0603;
      --bg-secondary: #11100e;
      --bg-sidebar: #0d0b09;
      --bg-card: #1a1815;
      --bg-hover: #252220;
      --border-color: #2d2a26;
      --gold: #c8a45c;
      --gold-bright: #e4c580;
      --gold-muted: #8b7355;
      --gold-dark: #5a4a30;
      --text-primary: #e8e4df;
      --text-secondary: #a8a39c;
      --text-muted: #6b6660;
      --font-heading: 'Cinzel', serif;
      --font-body: 'Atkinson Hyperlegible', sans-serif;
      --sidebar-width: 280px;
      --transition-speed: 0.3s;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-primary);
      background-color: var(--bg-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-muted); }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      height: 100vh;
      overflow-y: auto;
      z-index: 10;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

    .sidebar-logo {
      padding: 24px 20px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-logo a {
      display: block;
      line-height: 0;
    }

    .sidebar-logo img {
      max-width: 100%;
      height: auto;
      transition: opacity var(--transition-speed);
    }

    .sidebar-logo img:hover {
      opacity: 0.85;
    }

    .sidebar-nav {
      padding: 8px 0;
    }

    .sidebar-nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .sidebar-nav li {
      margin: 0;
      padding: 0;
    }

    .sidebar-nav a {
      display: block;
      padding: 10px 24px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: all var(--transition-speed);
      border-left: 3px solid transparent;
    }

    .sidebar-nav a:hover {
      color: var(--gold-bright);
      background: var(--bg-hover);
      border-left-color: var(--gold);
    }

    .sidebar-nav .active > a {
      color: var(--gold);
      border-left-color: var(--gold);
      background: linear-gradient(90deg, rgba(200,164,92,0.08), transparent);
    }

    .app-sub-sidebar a {
      padding-left: 40px !important;
      font-size: 13px !important;
    }

    .app-name {
      display: none !important;
    }

    .content {
      position: relative;
      left: var(--sidebar-width);
      width: calc(100% - var(--sidebar-width));
      min-height: 100vh;
      padding-top: 0;
    }

    .markdown-section {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 60px 60px;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      font-family: var(--font-heading);
      font-weight: 600;
      color: #fff;
      margin-top: 2em;
      margin-bottom: 0.6em;
      letter-spacing: 0.02em;
    }

    .markdown-section h1 {
      font-size: 2.2em;
      border-bottom: 2px solid var(--gold-dark);
      padding-bottom: 0.3em;
      margin-top: 0.5em;
    }

    .markdown-section h2 {
      font-size: 1.6em;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.25em;
    }

    .markdown-section h3 {
      font-size: 1.25em;
      color: var(--gold);
    }

    .markdown-section h4 {
      font-size: 1.05em;
      color: var(--gold-bright);
    }

    .markdown-section a {
      color: var(--gold);
      text-decoration: none;
      transition: color var(--transition-speed);
    }

    .markdown-section a:hover {
      color: var(--gold-bright);
      text-decoration: underline;
    }

    .markdown-section p {
      margin: 0 0 1.2em;
      color: var(--text-primary);
    }

    .markdown-section blockquote {
      margin: 1.5em 0;
      padding: 16px 20px;
      background: var(--bg-card);
      border-left: 4px solid var(--gold);
      border-radius: 0 4px 4px 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    .markdown-section blockquote p {
      margin: 0;
    }

    .markdown-section code {
      background: var(--bg-card);
      color: var(--gold-bright);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }

    .markdown-section pre {
      background: var(--bg-card) !important;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 16px !important;
    }

    .markdown-section pre code {
      background: none;
      padding: 0;
      color: var(--text-primary);
    }

    .markdown-section ul,
    .markdown-section ol {
      padding-left: 1.5em;
      margin-bottom: 1.2em;
    }

    .markdown-section li {
      margin-bottom: 0.3em;
    }

    .markdown-section hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
      margin: 2em 0;
    }

    .markdown-section table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5em 0;
    }

    .markdown-section th,
    .markdown-section td {
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      text-align: left;
    }

    .markdown-section th {
      background: var(--bg-card);
      color: var(--gold);
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 0.9em;
      letter-spacing: 0.05em;
    }

    .markdown-section tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.02);
    }

    .markdown-section tr:hover {
      background: rgba(200, 164, 92, 0.05);
    }

    .markdown-section details {
      margin: 1em 0;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      transition: border-color var(--transition-speed);
    }

    .markdown-section details:hover {
      border-color: var(--gold-muted);
    }

    .markdown-section details[open] {
      border-color: var(--gold-dark);
    }

    .markdown-section summary {
      cursor: pointer;
      font-family: var(--font-heading);
      font-weight: 600;
      color: var(--gold);
      font-size: 1em;
      letter-spacing: 0.03em;
      padding: 4px 0;
    }

    .markdown-section summary:hover {
      color: var(--gold-bright);
    }

    .markdown-section img {
      max-width: 100%;
      border-radius: 4px;
    }

    .markdown-section strong {
      color: #fff;
    }

    .markdown-section em {
      color: var(--text-secondary);
    }

    .search {
      border-bottom: 1px solid var(--border-color);
      padding: 12px 16px;
    }

    .search input {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 8px 12px;
      border-radius: 4px;
      font-family: var(--font-body);
      font-size: 13px;
      transition: border-color var(--transition-speed);
    }

    .search input:focus {
      outline: none;
      border-color: var(--gold-muted);
    }

    .search input::placeholder {
      color: var(--text-muted);
    }

    .search .clear-button {
      color: var(--text-muted);
    }

    .sidebar-toggle {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(10, 6, 3, 0.85);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 8px;
      backdrop-filter: blur(4px);
    }

    .sidebar-toggle-button {
      opacity: 0.7;
      cursor: pointer;
    }

    .sidebar-toggle-button span {
      background: var(--gold-muted);
      height: 2px;
      margin-bottom: 4px;
      border-radius: 1px;
    }

    .sidebar-toggle-button .sidebar-toggle-button-icon {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--gold-muted);
      margin-bottom: 4px;
      border-radius: 1px;
    }

    @media (min-width: 769px) {
      .sidebar-toggle {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .content {
        left: 0;
        width: 100%;
      }

      .markdown-section {
        padding: 24px 20px 40px;
      }

      .sidebar-logo img {
        max-width: 200px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '',
      loadSidebar: true,
      subMaxLevel: 4,
      coverpage: false,
      search: {
        placeholder: 'Buscar...',
        noData: 'Sin resultados'
      },
      plugins: [
        function(hook) {
          hook.ready(function() {
            var sidebar = document.querySelector('.sidebar');
            if (sidebar) {
              var logo = document.createElement('div');
              logo.className = 'sidebar-logo';
              logo.innerHTML = '<a href="#/"><img src="https://p325k7wa.twic.pics/high/dark-souls/dark-souls-1/00-page-setup/ds1_logo.png?twic=v1/resize=300/step=10/quality=80" alt="Dark Souls"></a>';
              sidebar.insertBefore(logo, sidebar.firstChild);
            }
          });
        },
        function(hook) {
          hook.mounted(function() {
            var searchEl = document.querySelector('.search');
            if (!searchEl) return;
            var observer = new MutationObserver(function() {
              searchEl.querySelectorAll('.results-panel a').forEach(function(item) {
                var titleEl = item.querySelector('h2');
                var bodyEl = item.querySelector('p');
                [titleEl, bodyEl].forEach(function(el) {
                  if (!el) return;
                  function escapeText(node) {
                    if (node.nodeType === 3) {
                      var text = node.textContent;
                      text = text
                        .replace(/</g, '&lt;').replace(/>/g, '&gt;')
                        .replace(/`{1,3}[^`]*`{1,3}/g, '')
                        .replace(/\[([^\]]*)\]\([^)]*\)/g, '$1')
                        .replace(/\[([^\]]*)\]\[[^\]]*\]/g, '$1')
                        .replace(/#{1,6}\s*/g, '')
                        .replace(/(\*{1,3}|_{1,3}|~{2})(.*?)\1/g, '$2')
                        .replace(/^[\s]*[-*+]\s+/gm, '')
                        .replace(/^[\s]*\d+\.\s+/gm, '')
                        .replace(/(?:^|\n)>+\s*/g, '')
                        .replace(/!\[([^\]]*)\]\([^)]*\)/g, '$1')
                        .replace(/\|/g, '')
                        .replace(/-{3,}/g, '')
                        .trim();
                      if (text !== node.textContent) node.textContent = text;
                    } else if (node.nodeType === 1 && node.tagName !== 'MARK' && node.tagName !== 'EM') {
                      Array.from(node.childNodes).forEach(escapeText);
                    }
                  }
                  Array.from(el.childNodes).forEach(escapeText);
                });
              });
            });
            observer.observe(searchEl, { childList: true, subtree: true });
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
