<!DOCTYPE html>
<html lang="en">
<style>
  /* Deslizamiento suave (lo mantenemos) */
  html {
    scroll-behavior: smooth;
  }
  
  /* Atacar a todos los posibles selectores de Docsify y sus temas */
  .sidebar ul li a,
  .sidebar ul li.active > a,
  .app-sub-sidebar li a,
  .app-sub-sidebar li.active > a,
  .sidebar-nav li a,
  .sidebar-nav li.active > a {
    font-weight: 400 !important; /* 400 es el valor exacto en web para "normal" */
  }

  /* Si estás usando el tema Docsify Themeable, esto desactiva su negrita interna */
  :root {
    --sidebar-nav-link-font-weight: 400 !important;
    --sidebar-nav-link-font-weight--active: 400 !important;
  }
</style>
<head>
  <meta charset="UTF-8">
  <title>Dark Souls | tomazingerz</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
</head>
<body>

    window.$docsify = {

</html>
